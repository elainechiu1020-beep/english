<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>English Coach - Ultimate Auto-Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: sans-serif; }
        .card { background: #161e2d; border: 1px solid #2d3748; }
        .word-correct { color: #4ade80; font-weight: bold; }
        .word-wrong { color: #f87171; text-decoration: line-through; opacity: 0.6; }
        .log-box { font-family: monospace; font-size: 10px; color: #94a3b8; background: #000; padding: 10px; border-radius: 8px; max-height: 150px; overflow-y: auto; border: 1px solid #334155; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg card rounded-[2.5rem] p-10 shadow-2xl">
        <div id="setupView" class="space-y-6">
            <h1 class="text-3xl font-black text-center text-white">ORAL <span class="text-blue-500 font-light">SYNC</span></h1>
            
            <div class="space-y-4">
                <input type="password" id="apiKey" placeholder="在此貼上您的 API Key" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 outline-none focus:border-blue-500 transition-all">
                
                <select id="themeSelect" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 appearance-none cursor-pointer">
                    <option value="Daily conversation">☕ 日常生活練習</option>
                    <option value="Job Interview">💼 職場英語面試</option>
                    <option value="Travel English">✈️ 旅遊常用英文</option>
                </select>
            </div>

            <button onclick="autoDiscoverAndStart()" id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-all">
                自動掃描並開始練習
            </button>
            
            <div id="log" class="log-box">等待初始化...</div>
        </div>

        <!-- 練習區 (邏輯不變) -->
        <div id="practiceView" class="hidden space-y-8 text-center">
            <div class="flex justify-between text-[10px] font-bold text-slate-500">
                <span id="progress">STEP 1 / 5</span>
                <span class="text-blue-500">AI CONNECTED</span>
            </div>
            <p id="target" class="text-2xl font-semibold italic text-white"></p>
            <div id="feedback" class="min-h-[4rem] p-4 bg-black/30 rounded-2xl flex flex-wrap justify-center gap-2 text-lg"></div>
            <div class="flex justify-center gap-6">
                <button onclick="speak()" class="w-12 h-12 bg-slate-800 rounded-full">🔊</button>
                <button onclick="toggleMic()" id="micBtn" class="w-20 h-20 bg-blue-600 rounded-full text-2xl shadow-xl">🎤</button>
                <button onclick="next()" class="w-12 h-12 bg-slate-800 rounded-full">➔</button>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let cur = 0;
        let isRecording = false;
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'en-US';
        rec.onresult = (e) => handleResult(e.results[0][0].transcript);
        rec.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('animate-pulse', 'bg-red-500'); };

        function addLog(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function autoDiscoverAndStart() {
            const key = document.getElementById('apiKey').value.trim();
            if (!key) return alert("請輸入 Key");
            
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            addLog("正在從 Google 伺服器獲取可用模型清單...");

            try {
                // 第一步：呼叫 ListModels 看看這個 Key 到底能用什麼
                const listResp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const listData = await listResp.json();

                if (listData.error) throw new Error(listData.error.message);

                // 篩選出支援 generateContent 的模型，並優先挑選 flash
                const availableModels = listData.models
                    .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                    .map(m => m.name);

                if (availableModels.length === 0) throw new Error("此 Key 沒有可用的生成模型。");

                addLog(`找到 ${availableModels.length} 個模型。`);
                
                // 優先序：flash > pro > 其他
                let bestModel = availableModels.find(m => m.includes("flash")) || availableModels[0];
                addLog(`嘗試使用最佳模型: ${bestModel}`);

                // 第二步：出題
                const theme = document.getElementById('themeSelect').value;
                const prompt = `Return a JSON array of 5 English sentences about ${theme}. Format: [{"t":"sentence"}]. No other text.`;
                
                const genResp = await fetch(`https://generativelanguage.googleapis.com/v1beta/${bestModel}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const genData = await genResp.json();
                const rawText = genData.candidates[0].content.parts[0].text;
                questions = JSON.parse(rawText.match(/\[.*\]/s)[0]);

                document.getElementById('setupView').classList.add('hidden');
                document.getElementById('practiceView').classList.remove('hidden');
                render();

            } catch (e) {
                addLog(`❌ 錯誤: ${e.message}`);
                btn.disabled = false;
                alert("初始化失敗，請看日誌細節。");
            }
        }

        function render() {
            document.getElementById('target').innerText = questions[cur].t;
            document.getElementById('progress').innerText = `STEP ${cur+1} / 5`;
            document.getElementById('feedback').innerHTML = "";
        }

        function toggleMic() {
            if (isRecording) { rec.stop(); } 
            else { 
                rec.start(); isRecording = true;
                document.getElementById('micBtn').classList.add('animate-pulse', 'bg-red-500');
            }
        }

        function handleResult(s) {
            const target = questions[cur].t;
            const words = target.split(/\s+/);
            const user = s.toLowerCase().replace(/[.,!?;]/g, "").split(/\s+/);
            const html = words.map(w => {
                const c = w.toLowerCase().replace(/[.,!?;]/g, "");
                return `<span class="${user.includes(c) ? 'word-correct' : 'word-wrong'}">${w}</span>`;
            }).join(" ");
            document.getElementById('feedback').innerHTML = `<div class="w-full text-[10px] text-slate-500 mb-2 italic">You said: ${s}</div>` + html;
        }

        function speak() {
            const u = new SpeechSynthesisUtterance(questions[cur].t);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }

        function next() {
            if (cur < 4) { cur++; render(); }
            else { alert("練習完成！"); location.reload(); }
        }
    </script>
</body>
</html>
